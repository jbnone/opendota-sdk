version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"

    allow:
      - dependency-type: "development"

    schedule:
      interval: "weekly"

    cooldown:
      default-days: 7

    commit-message:
      prefix: "deps"

    labels:
      - "dependencies"
      - "automated"

  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "weekly"

    commit-message:
      prefix: "ci"

    labels:
      - "dependencies"
      - "automated"
