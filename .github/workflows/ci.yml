name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies
      run: uv sync --all-groups

    - name: Run tests
      run: uv run pytest

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build PyPI artifact
        run: |
          rm -rf dist dist-pypi dist-testpypi
          uv build
          mkdir -p dist-pypi
          cp dist/* dist-pypi/

      - name: Set alpha version for TestPyPI
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          run_id = os.environ['GITHUB_RUN_ID']
          version = f'0.1.0-alpha.{run_id}'

          def replace(path, pattern, repl):
              text = path.read_text()
              path.write_text(re.sub(pattern, repl, text, count=1, flags=re.MULTILINE))

          replace(Path('pyproject.toml'), r'^(version\s*=\s*")(.*)(".*)$', lambda m: f"{m.group(1)}{version}{m.group(3)}")
          replace(Path('src/opendota_sdk/__init__.py'), r'^(.*__version__\s*=\s*")(.*)(".*)$', lambda m: f"{m.group(1)}{version}{m.group(3)}")
          print('Set project version to', version)
          PY

      - name: Build TestPyPI artifact
        run: |
          rm -rf dist
          uv build
          mkdir -p dist-testpypi
          cp dist/* dist-testpypi/

      - name: Restore original version files
        run: git restore pyproject.toml src/opendota_sdk/__init__.py

      - name: Upload PyPI artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-package-distributions-pypi
          path: dist-pypi/

      - name: Upload TestPyPI artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-package-distributions-testpypi
          path: dist-testpypi/

  testpypi-publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: testpypi
      url: https://test.pypi.org/p/opendota-sdk

    steps:
      - name: Download TestPyPI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-package-distributions-testpypi
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi-publish:
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/opendota-sdk
    
    steps:
      - name: Download PyPI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-package-distributions-pypi
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
